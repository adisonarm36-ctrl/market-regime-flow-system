# Yahoo-first historical workflow. Set active_source to csv only when using
# local CSV/manual fallback data.
active_source: yahoo
source_settings:
  csv:
    price_path:
    metadata_path:
    sector_map_path:
    dr_mapping_path:
    reference_data:
      thailand_universe_path: data/reference/thailand/thailand_universe_sample.csv
      thailand_sector_map_path: data/reference/thailand/thailand_sector_map_sample.csv
      thailand_security_types_path: data/reference/thailand/thailand_security_types_sample.csv
      thailand_liquidity_path: data/reference/thailand/thailand_liquidity_sample.csv
      thailand_dr_mapping_path: data/reference/thailand/thailand_dr_mapping_sample.csv
      dr_market_data_path: data/reference/thailand/dr_quality/dr_market_data_sample.csv
      dr_bid_ask_path: data/reference/thailand/dr_quality/dr_bid_ask_sample.csv
      dr_fair_value_inputs_path: data/reference/thailand/dr_quality/dr_fair_value_inputs_sample.csv
      fx_rates_path: data/reference/thailand/dr_quality/fx_rates_sample.csv
      underlying_prices_path: data/reference/thailand/dr_quality/underlying_prices_sample.csv
  yahoo:
    # Yahoo/yfinance is for historical OHLCV prices only.
    # It is not realtime and is not a source for metadata, Thailand security
    # type, DR/DRx mapping, sector/country maps, liquidity, or fair value.
    tickers:
      - SPY
      - QQQ
      - IWM
      - TLT
      - IEF
      - SHY
      - GLD
      - SLV
      - USO
      - UUP
      - BTC-USD
      - ETH-USD
    period: 2y
    interval: 1d
    auto_adjust: true
    cache_dir: data/cache/yahoo
    cache_format: parquet
    cache_ttl_hours: 8
    fallback_to_cache: true
    reference_data:
      # Production paths remain strict. The dashboard's explicit demo reference
      # toggle can map missing paths to *_sample files at runtime only.
      metadata_path: data/reference/metadata.csv
      sector_map_path: data/reference/sector_map.csv
      country_map_path: data/reference/country_map.csv
      asset_map_path: config/asset_map.yaml
      dr_mapping_path: config/dr_mapping.yaml
      thailand_universe_path: data/reference/thailand/thailand_universe_sample.csv
      thailand_sector_map_path: data/reference/thailand/thailand_sector_map_sample.csv
      thailand_security_types_path: data/reference/thailand/thailand_security_types_sample.csv
      thailand_liquidity_path: data/reference/thailand/thailand_liquidity_sample.csv
      thailand_dr_mapping_path: data/reference/thailand/thailand_dr_mapping_sample.csv
      dr_market_data_path: data/reference/thailand/dr_quality/dr_market_data_sample.csv
      dr_bid_ask_path: data/reference/thailand/dr_quality/dr_bid_ask_sample.csv
      dr_fair_value_inputs_path: data/reference/thailand/dr_quality/dr_fair_value_inputs_sample.csv
      fx_rates_path: data/reference/thailand/dr_quality/fx_rates_sample.csv
      underlying_prices_path: data/reference/thailand/dr_quality/underlying_prices_sample.csv
